<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LECTO PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--sf:#1a1a1a;--sf3:#2e2e2e;
  --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);
  --tx:#f0ede6;--tx2:#9e9a93;--tx3:#6b6762;
  --ac:#e8d5a3;--ac2:#c4a96d;
  --hl:rgba(232,213,163,0.25);--hlb:rgba(232,213,163,0.6);
  --red:#e05c5c;--r:10px;--rs:6px;
  --sbot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);position:fixed;width:100%;}
body{font-family:'Instrument Sans',sans-serif;color:var(--tx);display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{height:52px;background:var(--sf);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 8px;gap:2px;flex-shrink:0;z-index:1001;position:relative;}
.brand{font-family:'DM Serif Display',serif;font-size:16px;color:var(--ac);white-space:nowrap;margin-right:4px;flex-shrink:0;}
.sep{width:1px;height:20px;background:var(--b2);margin:0 2px;flex-shrink:0;}
.sp{flex:1;}
.btn{display:flex;align-items:center;justify-content:center;gap:4px;height:40px;min-width:40px;padding:0 6px;border-radius:var(--rs);border:1px solid transparent;background:transparent;color:var(--tx2);font-family:'Instrument Sans',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn:active{background:var(--sf3);color:var(--tx);}
.btn.on{background:var(--sf3);color:var(--ac);}
.btn svg{width:16px;height:16px;flex-shrink:0;pointer-events:none;}
.btn:disabled{opacity:.3;pointer-events:none;}

.pg-grp{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--tx2);flex-shrink:0;}
.pg-inp{width:40px;height:32px;background:var(--sf3);border:1px solid var(--b2);border-radius:var(--rs);color:var(--tx);text-align:center;font-family:'DM Mono',monospace;font-size:12px;outline:none;touch-action:manipulation;}

/* Desktop only zoom controls */
@media(max-width:640px){
  .zm-sel,.btnZI-d,.btnZO-d,.btnHL-d,.btnBM-d,.sep-d{display:none!important;}
}

/* FILE OPEN FIX */
.file-label, .drop-label{
  position:relative;display:flex;align-items:center;gap:5px;height:36px;padding:0 12px;border-radius:var(--rs);background:var(--ac2);color:#1a1400;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overflow:hidden;z-index:10;
}
.drop-label{height:52px;padding:0 28px;border-radius:var(--r);font-size:15px;}
.file-label input, .drop-label input{
  position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:20;display:block;
}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{width:220px;background:var(--sf);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden;z-index:1005;}
.sidebar.closed{width:0;}
@media(max-width:640px){
  .sidebar{position:fixed;inset:auto 0 0 0;width:100%!important;height:60vh;border-right:none;border-top:1px solid var(--b2);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
  .sidebar.mob-open{transform:translateY(0);}
}
.s-ov{display:none;position:fixed;inset:0;z-index:1002;background:rgba(0,0,0,.6);}
.drag-hdl{display:none;width:36px;height:4px;border-radius:2px;background:var(--b2);margin:10px auto 2px;flex-shrink:0;}
@media(max-width:640px){.drag-hdl{display:block;}}
.s-tabs{display:flex;border-bottom:1px solid var(--b);flex-shrink:0;}
.s-tab{flex:1;height:42px;background:transparent;border:none;color:var(--tx3);font-size:11px;font-weight:500;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;}
.s-tab.on{color:var(--ac);border-bottom-color:var(--ac);}
.s-panel{display:none;flex:1;overflow-y:auto;}
.s-panel.on{display:flex;flex-direction:column;}

/* VIEWER */
.viewer{flex:1;overflow:auto;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px;position:relative;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;}
.drop{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--tx3);padding:24px;text-align:center;z-index:5;}
.drop.gone{display:none;}
.drop h2{font-family:'DM Serif Display',serif;font-size:22px;color:var(--tx2);}

.pw{position:relative;box-shadow:0 4px 32px rgba(0,0,0,.7);flex-shrink:0;user-select:none;}
.pw canvas{display:block;touch-action:none;max-width:100%;}
.hl-layer,.link-layer{position:absolute;inset:0;pointer-events:none;}
.hl-rect{position:absolute;background:var(--hl);border:1px solid var(--hlb);border-radius:2px;pointer-events:all;}

/* BOTTOM BAR */
.btmbar{display:none;background:var(--sf);border-top:1px solid var(--b);align-items:center;justify-content:space-around;flex-shrink:0;height:calc(54px + var(--sbot));padding-bottom:var(--sbot);z-index:1001;}
@media(max-width:640px){.btmbar{display:flex;}}
.bb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--tx3);font-size:10px;cursor:pointer;min-width:52px;-webkit-tap-highlight-color:transparent;}
.bb svg{width:22px;height:22px;}
.bb.on{color:var(--ac);}

.statusbar{height:24px;background:var(--sf);border-top:1px solid var(--b);display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0;font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3);z-index:1001;}
@media(max-width:640px){.statusbar{display:none;}}

.mode-badge{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--ac2);color:#1a1400;font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;pointer-events:none;display:none;z-index:2000;}
.mode-badge.on{display:block;}

.loading{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.8);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.loading.on{display:flex;}
.spin{width:30px;height:30px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">◈ LECTO</span>
  <div class="sep"></div>
  <button class="btn" id="btnSB"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="12" rx="2"></rect><line x1="5" y1="2" x2="5" y2="14"></line></svg></button>
  <div class="sep"></div>
  <button class="btn" id="btnBk" disabled=""><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="7,3 2,8 7,13"></polyline><line x1="2" y1="8" x2="14" y2="8"></line></svg></button>
  <button class="btn" id="btnFw" disabled=""><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="9,3 14,8 9,13"></polyline><line x1="14" y1="8" x2="2" y2="8"></line></svg></button>
  <div class="sep"></div>
  <button class="btn" id="btnPv"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="10,3 5,8 10,13"></polyline></svg></button>
  <div class="pg-grp">
    <input class="pg-inp" type="number" id="pgInp" min="1" value="1" inputmode="numeric">
    <span>/<span id="totPg">-</span></span>
  </div>
  <button class="btn" id="btnNx"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="6,3 11,8 6,13"></polyline></svg></button>
  <div class="sp"></div>
  <label class="file-label">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v4h12v-4"></path><path d="M8 2v7m-3-3l3-3 3 3"></path></svg>
    열기
    <input type="file" id="fi" accept=".pdf">
  </label>
</div>

<div class="main">
  <div class="sidebar closed" id="sb">
    <div class="drag-hdl"></div>
    <div class="s-tabs">
      <button class="s-tab on" data-p="thumbs">썸네일</button>
      <button class="s-tab" data-p="bmarks">북마크</button>
    </div>
    <div class="s-panel on" id="p-thumbs"><div class="thumbs" id="tList"></div></div>
    <div class="s-panel" id="p-bmarks"><div class="bm-list" id="bmList"></div></div>
  </div>
  <div class="s-ov" id="sOv"></div>
  <div class="viewer" id="viewer">
    <div class="drop" id="drop">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.25"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
      <h2>PDF 파일을 여세요</h2>
      <label class="drop-label">
        PDF 선택하기
        <input type="file" id="fi2" accept=".pdf">
      </label>
    </div>
  </div>
</div>

<div class="btmbar">
  <button class="bb" id="bbSB"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>패널</button>
  <button class="bb" id="bbHL"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="14" width="18" height="7" rx="1.5" fill="currentColor" opacity="0.3"></rect><path d="M5 14 L8 4 L16 4 L19 14"></path></svg>강조</button>
  <button class="bb" id="bbBM"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 3h14v19l-7-4-7 4V3z"></path></svg>북마크</button>
  <button class="bb" id="bbZO"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"></circle><line x1="8" y1="11" x2="14" y2="11"></line></svg>축소</button>
  <button class="bb" id="bbZI"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"></circle><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>확대</button>
</div>

<div class="statusbar">
  <span id="stF">파일 없음</span><span>|</span><span id="stP">-</span><span>|</span><span id="stZ">100%</span>
</div>
<div class="mode-badge" id="mBadge">✦ 하이라이트 모드</div>
<div class="loading" id="ld"><div class="spin"></div></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdf=null, curPg=1, scale=1.0, hlMode=false;
let hls=JSON.parse(localStorage.getItem('lecto-hl')||'{}');
let bookmarks=JSON.parse(localStorage.getItem('lecto-bm')||'[]');
let curFile='', isSel=false, selStart=null, thumbsDone=false;
let pinchActive=false, pinchD0=0, pinchS0=1;

const viewer=document.getElementById('viewer');
const drop=document.getElementById('drop');
const pgInp=document.getElementById('pgInp');
const ld=document.getElementById('ld');

// File Loading
function handleFile(f){
  if(!f) return;
  ld.classList.add('on');
  const r=new FileReader();
  r.onload=ev=>loadPDF(ev.target.result, f.name);
  r.readAsArrayBuffer(f);
}

document.getElementById('fi').addEventListener('change', e=>{handleFile(e.target.files[0]); e.target.value='';});
document.getElementById('fi2').addEventListener('change', e=>{handleFile(e.target.files[0]); e.target.value='';});

async function loadPDF(data, name){
  try{
    pdf = await pdfjsLib.getDocument({data}).promise;
    curFile = name;
    document.getElementById('totPg').textContent = pdf.numPages;
    document.getElementById('stF').textContent = name;
    drop.classList.add('gone');
    thumbsDone = false;
    await renderPg(1);
    renderThumbs();
  }catch(e){alert('Error: '+e.message);}
  ld.classList.remove('on');
}

async function renderPg(num){
  if(!pdf) return;
  curPg=num; pgInp.value=num;
  const page = await pdf.getPage(num);
  const vp = page.getViewport({scale});
  
  viewer.querySelectorAll('.pw').forEach(el=>el.remove());
  const pw=document.createElement('div'); pw.className='pw';
  pw.style.width=vp.width+'px'; pw.style.height=vp.height+'px';
  
  const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
  const ctx=cv.getContext('2d');
  pw.appendChild(cv);
  
  const hlL=document.createElement('div'); hlL.className='hl-layer'; pw.appendChild(hlL);
  viewer.appendChild(pw);
  
  await page.render({canvasContext:ctx, viewport:vp}).promise;
  renderHLs(hlL, num, vp);
  addTouchEvents(cv, pw, vp, hlL);
}

// Touch & Zoom Logic
function addTouchEvents(cv, pw, vp, hlL){
  cv.addEventListener('touchstart', e=>{
    if(e.touches.length===2){
      pinchActive=true;
      pinchD0 = Math.hypot(e.touches[0].pageX-e.touches[1].pageX, e.touches[0].pageY-e.touches[1].pageY);
      pinchS0 = scale;
    }
  }, {passive:false});

  cv.addEventListener('touchmove', e=>{
    if(pinchActive && e.touches.length===2){
      e.preventDefault();
      let d1 = Math.hypot(e.touches[0].pageX-e.touches[1].pageX, e.touches[0].pageY-e.touches[1].pageY);
      let ratio = d1/pinchD0;
      pw.style.transform = `scale(${ratio})`;
    }
  }, {passive:false});

  cv.addEventListener('touchend', e=>{
    if(pinchActive){
      pinchActive=false;
      const m = new DOMMatrix(getComputedStyle(pw).transform);
      scale = Math.max(0.5, Math.min(4, pinchS0 * m.a));
      document.getElementById('stZ').textContent = Math.round(scale*100)+'%';
      renderPg(curPg);
    }
  });
}

function renderHLs(layer, pg, vp){
  layer.innerHTML='';
  const k=curFile+'_'+pg;
  (hls[k]||[]).forEach(r=>{
    const el=document.createElement('div'); el.className='hl-rect';
    el.style.left=(r.x*vp.width)+'px'; el.style.top=(r.y*vp.height)+'px';
    el.style.width=(r.w*vp.width)+'px'; el.style.height=(r.h*vp.height)+'px';
    layer.appendChild(el);
  });
}

async function renderThumbs(){
  if(!pdf || thumbsDone) return;
  const list=document.getElementById('tList'); list.innerHTML='';
  for(let i=1; i<=pdf.numPages; i++){
    const p=await pdf.getPage(i);
    const v=p.getViewport({scale:0.2});
    const itm=document.createElement('div'); itm.style.margin="10px"; itm.style.cursor="pointer";
    const c=document.createElement('canvas'); c.width=v.width; c.height=v.height;
    await p.render({canvasContext:c.getContext('2d'), viewport:v}).promise;
    itm.appendChild(c);
    itm.onclick=()=>{ renderPg(i); if(window.innerWidth<=640) toggleSB(); };
    list.appendChild(itm);
  }
  thumbsDone=true;
}

function toggleSB(){
  const sb=document.getElementById('sb');
  const ov=document.getElementById('sOv');
  if(window.innerWidth<=640){
    sb.classList.toggle('mob-open');
    ov.style.display = sb.classList.contains('mob-open') ? 'block' : 'none';
  } else {
    sb.classList.toggle('closed');
  }
}

document.getElementById('btnSB').onclick=toggleSB;
document.getElementById('bbSB').onclick=toggleSB;
document.getElementById('sOv').onclick=toggleSB;
document.getElementById('btnPv').onclick=()=>{if(curPg>1)renderPg(curPg-1);};
document.getElementById('btnNx').onclick=()=>{if(pdf && curPg<pdf.numPages)renderPg(curPg+1);};
document.getElementById('bbZI').onclick=()=>{scale+=0.25; renderPg(curPg); document.getElementById('stZ').textContent=Math.round(scale*100)+'%';};
document.getElementById('bbZO').onclick=()=>{scale=Math.max(0.5, scale-0.25); renderPg(curPg); document.getElementById('stZ').textContent=Math.round(scale*100)+'%';};
</script>
</body>
</html>
